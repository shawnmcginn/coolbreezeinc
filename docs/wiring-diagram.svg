<svg xmlns="http://www.w3.org/2000/svg" width="700" height="420" font-family="monospace" font-size="13">

  <!-- Background -->
  <rect width="700" height="420" fill="#fff"/>

  <!-- ── BATTERY ── -->
  <rect x="20" y="170" width="90" height="50" fill="#e8f4e8" stroke="#333" stroke-width="2"/>
  <text x="65" y="191" text-anchor="middle" font-weight="bold">BATTERY</text>
  <text x="65" y="207" text-anchor="middle">3V</text>

  <!-- Battery + out (top wire right) -->
  <line x1="110" y1="183" x2="180" y2="183" stroke="#c00" stroke-width="2"/>
  <text x="140" y="175" text-anchor="middle" fill="#c00">+</text>

  <!-- ── SWITCH ── -->
  <rect x="180" y="163" width="80" height="40" fill="#fff8dc" stroke="#333" stroke-width="2"/>
  <text x="220" y="181" text-anchor="middle" font-weight="bold">SWITCH</text>
  <text x="220" y="196" text-anchor="middle">(in + line)</text>

  <!-- Switch out right -->
  <line x1="260" y1="183" x2="340" y2="183" stroke="#c00" stroke-width="2"/>

  <!-- Split dot -->
  <circle cx="340" cy="183" r="5" fill="#c00"/>

  <!-- ── BRANCH 1: straight to controller board ── -->
  <line x1="340" y1="183" x2="340" y2="100" stroke="#c00" stroke-width="2"/>
  <line x1="340" y1="100" x2="520" y2="100" stroke="#c00" stroke-width="2"/>
  <text x="420" y="92" text-anchor="middle" fill="#c00">+ (direct)</text>

  <!-- ── CONTROLLER BOARD ── -->
  <rect x="520" y="70" width="110" height="60" fill="#dce8ff" stroke="#333" stroke-width="2"/>
  <text x="575" y="93" text-anchor="middle" font-weight="bold">CONTROLLER</text>
  <text x="575" y="109" text-anchor="middle">BOARD</text>
  <text x="575" y="125" text-anchor="middle">+  &amp;  −</text>

  <!-- Board − down to GND bus -->
  <line x1="575" y1="130" x2="575" y2="340" stroke="#00c" stroke-width="2"/>

  <!-- ── BRANCH 2: through resistor to LED ── -->
  <line x1="340" y1="183" x2="340" y2="260" stroke="#c00" stroke-width="2"/>
  <line x1="340" y1="260" x2="390" y2="260" stroke="#c00" stroke-width="2"/>

  <!-- ── 330Ω RESISTOR ── -->
  <rect x="390" y="245" width="90" height="30" fill="#fff0e0" stroke="#333" stroke-width="2"/>
  <text x="435" y="258" text-anchor="middle" font-weight="bold">330 Ω</text>
  <text x="435" y="271" text-anchor="middle">resistor</text>

  <!-- Resistor to LED + -->
  <line x1="480" y1="260" x2="520" y2="260" stroke="#c00" stroke-width="2"/>
  <text x="500" y="252" text-anchor="middle" fill="#c00">+</text>

  <!-- ── LED ── -->
  <rect x="520" y="240" width="80" height="40" fill="#ffe8ff" stroke="#333" stroke-width="2"/>
  <text x="560" y="258" text-anchor="middle" font-weight="bold">LED</text>
  <text x="560" y="273" text-anchor="middle">+ leg / − leg</text>

  <!-- LED − down to GND bus -->
  <line x1="560" y1="280" x2="560" y2="340" stroke="#00c" stroke-width="2"/>
  <text x="548" y="315" fill="#00c">−</text>

  <!-- ── GND BUS ── -->
  <line x1="65" y1="340" x2="620" y2="340" stroke="#00c" stroke-width="2.5"/>
  <text x="340" y="360" text-anchor="middle" fill="#00c" font-weight="bold">── GND (−) common return ──</text>

  <!-- Battery − up to GND bus -->
  <line x1="65" y1="220" x2="65" y2="340" stroke="#00c" stroke-width="2"/>
  <text x="53" y="240" fill="#00c">−</text>

  <!-- Board − label -->
  <text x="583" y="240" fill="#00c" font-size="11">−</text>

</svg>
